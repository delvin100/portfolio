<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark slate background -->
  <rect width="512" height="512" rx="112" fill="#0f172a" />
  
  <!-- Subtle glowing gradient overlay -->
  <rect width="512" height="512" rx="112" fill="url(#grad)" />
  
  <!-- Inner border for depth -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#334155" stroke-width="4" stroke-opacity="0.5" />
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Stylized "DV" -->
  <text 
    x="50%" 
    y="54%" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-weight="900" 
    font-size="280" 
    fill="#38bdf8" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-15"
  >
    DV
  </text>
</svg>
